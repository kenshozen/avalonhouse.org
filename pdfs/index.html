<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>PDFs · The Avalon Institute</title>
  <meta name="description" content="Selected PDFs from The Avalon Institute.">
  <link rel="canonical" href="https://avalon.institute/pdfs/">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&amp;family=Cinzel:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #141c12;
      --green-mid: #1d281a;
      --gold: #d89a3a;
      --gold-dim: #9a6a1f;
      --cream: #f0e8d6;
      --text: #e8dfc8;
      --text-dim: #a99f8c;
      --line: rgba(216, 154, 58, 0.34);
      --page: 1080px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--green);
      color: var(--text);
      font-family: "EB Garamond", Georgia, serif;
      font-size: 18px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      pointer-events: none;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.18'/%3E%3C/svg%3E");
    }

    a { color: inherit; }

    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 5px;
    }

    .shell {
      width: min(var(--page), calc(100% - 3rem));
      margin-inline: auto;
    }

    header {
      padding-block: 1.6rem;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      color: var(--gold);
      font-family: "Cinzel", serif;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .brand:hover { color: var(--cream); }

    main {
      min-height: calc(100vh - 170px);
      padding-block: clamp(4.5rem, 9vw, 8rem);
    }

    .page-head {
      display: grid;
      grid-template-columns: auto minmax(4rem, 1fr);
      gap: clamp(2rem, 5vw, 5rem);
      align-items: center;
      margin-bottom: clamp(3rem, 6vw, 5rem);
    }

    h1 {
      margin: 0;
      color: var(--cream);
      font-family: "Cinzel", serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 500;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .heading-rule {
      height: 1px;
      background: linear-gradient(to right, var(--gold-dim), transparent);
      opacity: 0.78;
    }

    .document-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: clamp(1.5rem, 3vw, 2.5rem);
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .document-card {
      display: block;
      text-decoration: none;
    }

    .document-preview {
      aspect-ratio: 700 / 989;
      overflow: hidden;
      margin: 0;
      background: #f4efe4;
      border: 1px solid var(--line);
      box-shadow: 0 14px 32px rgba(4, 8, 4, 0.28);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .document-preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .document-title {
      display: block;
      margin-top: 0.85rem;
      color: var(--cream);
      font-family: "Cinzel", serif;
      font-size: 0.72rem;
      letter-spacing: 0.07em;
      line-height: 1.45;
    }

    .document-card:hover .document-preview {
      border-color: var(--gold);
      box-shadow: 0 18px 40px rgba(4, 8, 4, 0.4);
      transform: translateY(-2px);
    }

    .document-card:hover .document-title { color: var(--gold); }

    footer {
      padding-block: 2rem;
      border-top: 1px solid var(--line);
      color: var(--text-dim);
      font-size: 0.84rem;
    }

    @media (max-width: 620px) {
      .shell { width: min(100% - 2rem, var(--page)); }
      header { padding-block: 1.25rem; }
      main { padding-block: 3.5rem 5rem; }
      .page-head { gap: 1.5rem; margin-bottom: 2.5rem; }

      .document-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .document-title { font-size: 0.66rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .document-preview { transition: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <a class="brand" href="/">The Avalon Institute</a>
    </div>
  </header>

  <main class="shell">
    <div class="page-head">
      <h1>PDFs</h1>
      <div class="heading-rule" aria-hidden="true"></div>
    </div>

    <ul class="document-grid">
      <li>
        <a class="document-card" href="/avalon-prospectus.pdf" aria-label="Open Avalon’s Prospectus (PDF)">
          <figure class="document-preview">
            <img src="./pdf-previews/avalon-prospectus.png" width="700" height="989" alt="" loading="lazy" decoding="async">
          </figure>
          <span class="document-title">Avalon’s Prospectus</span>
        </a>
      </li>
      <li>
        <a class="document-card" href="./paul-valery-style.pdf" aria-label="Open Style by Paul Valéry, translated by Ralph Manheim (PDF, 4 pages)">
          <figure class="document-preview">
            <img src="./pdf-previews/paul-valery-style.png" width="700" height="1050" alt="" loading="lazy" decoding="async">
          </figure>
          <span class="document-title">Paul Valéry · Style</span>
        </a>
      </li>
    </ul>
  </main>

  <footer>
    <div class="shell">The Avalon Institute · Twin Peaks, San Francisco</div>
  </footer>
</body>
</html>
